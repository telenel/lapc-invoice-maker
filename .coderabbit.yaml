language: en-US
reviews:
  profile: "chill"
  auto_review:
    enabled: true
    drafts: false
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  path_filters:
    - "!docs/superpowers/**"
    - "!docs/CODEMAPS/**"
    - "!**/*.md"
  path_instructions:
    - path: "prisma/schema.prisma"
      instructions: |
        Prisma 7 project. Single-word fields don't need @map since they're already snake_case.
        staffId and contactId are intentionally both optional — app-level validation ensures one is set.
    - path: "src/components/**"
      instructions: |
        Uses shadcn/ui v4 with base-ui, NOT Radix. No asChild prop exists.
        Link wrapping Button is acceptable in this project — base-ui Button renders a div, not a button element.
    - path: "prisma/migrations/**"
      instructions: |
        Migrations are generated by Prisma. Only flag SQL injection or data loss risks, not style issues.
    - path: "src/domains/chat/**"
      instructions: |
        AI chatbot uses Vercel AI SDK v6 with Claude Haiku. Per-user Chat singleton is by design.
chat:
  auto_reply: true
