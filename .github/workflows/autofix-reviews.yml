name: Auto-fix CodeRabbit Reviews

on:
  pull_request_review:
    types: [submitted]

concurrency:
  group: autofix-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  autofix:
    timeout-minutes: 10
    if: >
      github.event.review.state == 'changes_requested' &&
      github.event.review.user.login == 'coderabbitai[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_bots: "coderabbitai[bot]"
          claude_args: |
            --max-turns 30
            --allowedTools "Bash(gh:*),Bash(npm:*),Bash(npx:*),Bash(git:*),Bash(curl:*),Read,Edit,Write,Grep,Glob"
            --disallowedTools "WebFetch,Agent"
          prompt: |
            CodeRabbit has requested changes on this PR. Fix them.

            ## Context
            - Repo: telenel/lapc-invoice-maker
            - PR: #${{ github.event.pull_request.number }}
            - Branch: ${{ github.event.pull_request.head.ref }}
            - `gh` CLI is pre-authenticated. Do NOT set GH_TOKEN or use $() substitution.

            ## Step 1: Get review comments (with thread IDs)
            Run this exact command to get unresolved review threads:
            ```
            gh api graphql -f query='query { repository(owner: "telenel", name: "lapc-invoice-maker") { pullRequest(number: ${{ github.event.pull_request.number }}) { reviewThreads(first: 50) { nodes { id isResolved path line comments(first: 3) { nodes { author { login } body } } } } } } }' --jq '.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false)'
            ```
            Save each thread's `id` field — you will need it in Step 4.

            ## Step 2: Fix each issue
            For each unresolved thread from coderabbitai[bot]:
            - If the comment has a "Prompt for AI Agents" section, follow those instructions exactly
            - Otherwise read the suggestion and apply the fix
            - Skip suggestions that are wrong or don't apply

            ## Step 3: Verify
            Run: `npm run lint && npm run build`
            If either fails, fix the errors before proceeding.

            ## Step 4: Commit, push, and resolve threads
            ```
            git add -A
            git commit -m "fix: address CodeRabbit review"
            git push
            ```
            Then resolve each thread you fixed using its ID from Step 1:
            ```
            gh api graphql -f query='mutation { resolveReviewThread(input: { threadId: "THREAD_ID_HERE" }) { thread { isResolved } } }'
            ```
            Run this for every thread ID you addressed. This tells CodeRabbit the issues are fixed and unblocks auto-approve.

            ## Rules
            - Do NOT use $() command substitution — it is blocked
            - Do NOT retry a command more than twice if it fails — move on
            - Only fix issues from CodeRabbit — no unrelated changes
            - Project conventions: `escapeHtml()` for HTML templates, `!= null` for Decimal fields, update Zod schemas when adding fields
