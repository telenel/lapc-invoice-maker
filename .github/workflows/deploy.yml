name: Deploy to VPS

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    env:
      DEPLOY_VERIFY_ATTEMPTS: 28
      DEPLOY_VERIFY_SLEEP: 15
      DEPLOY_VERIFY_INITIAL_SLEEP: 60
    steps:
      - name: Trigger deploy webhook
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          response=$(curl -sfS --connect-timeout 10 --max-time 30 -X POST \
            https://montalvo.io/hooks/deploy-laportal \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            -w "\n%{http_code}")
          body=$(printf '%s\n' "$response" | sed '$d')
          code=$(printf '%s\n' "$response" | tail -1)
          echo "Webhook response: HTTP $code — $body"
          if [ "$code" != "200" ] || ! printf '%s' "$body" | grep -Fq "Deploy triggered"; then
            echo "Deploy webhook failed: HTTP $code — $body"
            exit 1
          fi
          echo "Deploy triggered successfully"

      - name: Health check
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          expected_sha="${EXPECTED_SHA::7}"
          echo "Waiting for deployed build SHA $expected_sha..."
          sleep "$DEPLOY_VERIFY_INITIAL_SLEEP"
          last_body=""
          for i in $(seq 1 "$DEPLOY_VERIFY_ATTEMPTS"); do
            body=""
            if ! body=$(curl -fsS --connect-timeout 10 --max-time 20 https://laportal.montalvo.io/api/version 2>/dev/null); then
              body=""
            fi
            last_body="$body"
            status=$(printf '%s' "$body" | grep -oE '"status":"[^"]+"' | cut -d'"' -f4 || true)
            deployed_sha=$(printf '%s' "$body" | grep -oE '"buildSha":"[a-f0-9]+"' | cut -d'"' -f4 || true)
            echo "Attempt $i/$DEPLOY_VERIFY_ATTEMPTS: status=${status:-unknown} buildSha=${deployed_sha:-missing}"
            if [ "$status" = "ok" ] && [ "$deployed_sha" = "$expected_sha" ]; then
              echo "Deploy verification passed"
              exit 0
            fi
            sleep "$DEPLOY_VERIFY_SLEEP"
          done
          echo "Last /api/version response: ${last_body:-<empty>}"
          echo "Deploy verification failed: live build SHA did not match $expected_sha"
          exit 1
