name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Pushed Git ref, branch, tag, or SHA to build and deploy"
        required: false
        default: "main"

permissions:
  contents: read
  packages: read

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      full_sha: ${{ steps.meta.outputs.full_sha }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      build_time: ${{ steps.meta.outputs.build_time }}
      image_repository: ${{ steps.meta.outputs.image_repository }}
      image: ${{ steps.meta.outputs.image }}
      deploy_ref: ${{ steps.target.outputs.deploy_ref }}
    steps:
      - name: Resolve deploy target
        id: target
        env:
          INPUT_REF: ${{ github.event.inputs.ref }}
        run: |
          ref="${INPUT_REF:-main}"

          {
            echo "checkout_ref=$ref"
            echo "deploy_ref=$ref"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.target.outputs.checkout_ref }}

      - name: Compute image metadata
        id: meta
        run: |
          full_sha=$(git rev-parse HEAD)
          short_sha=$(git rev-parse --short=7 HEAD)
          build_time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          image_repository="ghcr.io/${GITHUB_REPOSITORY,,}"
          image="$image_repository:$full_sha"

          {
            echo "full_sha=$full_sha"
            echo "short_sha=$short_sha"
            echo "build_time=$build_time"
            echo "image_repository=$image_repository"
            echo "image=$image"
          } >> "$GITHUB_OUTPUT"

      - name: Require public build secrets
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] || [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "::error::NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_ANON_KEY must be configured before building the deploy image."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish exact image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_SHA=${{ steps.meta.outputs.short_sha }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
      DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
      DEPLOY_REMOTE_PROJECT_DIR: ${{ secrets.DEPLOY_REMOTE_PROJECT_DIR || '/opt/lapc-invoice-maker' }}
      EXPECTED_SHA: ${{ needs.publish.outputs.full_sha }}
      DEPLOY_IMAGE: ${{ needs.publish.outputs.image }}
      DEPLOY_REF: ${{ needs.publish.outputs.deploy_ref }}
      GHCR_USERNAME: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Require SSH deploy secrets
        run: |
          if [ -z "$DEPLOY_SSH_HOST" ] || [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::error::DEPLOY_SSH_HOST and DEPLOY_SSH_KEY must be configured for exact-image VPS deploys."
            exit 1
          fi

      - name: Configure SSH
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_SSH_PORT" "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy exact image over SSH
        run: |
          quoted_project_dir=$(printf '%q' "$DEPLOY_REMOTE_PROJECT_DIR")
          quoted_deploy_ref=$(printf '%q' "$DEPLOY_REF")
          quoted_deploy_image=$(printf '%q' "$DEPLOY_IMAGE")
          quoted_ghcr_username=$(printf '%q' "$GHCR_USERNAME")
          quoted_ghcr_token=$(printf '%q' "$GHCR_TOKEN")
          remote_cmd="cd $quoted_project_dir && DEPLOY_CHANNEL=github-main DEPLOY_ACTOR=github-actions DEPLOY_EXPECTED_SHA=$EXPECTED_SHA DEPLOY_IMAGE=$quoted_deploy_image GHCR_USERNAME=$quoted_ghcr_username GHCR_TOKEN=$quoted_ghcr_token ./scripts/deploy-webhook.sh $quoted_deploy_ref"
          ssh_target="$DEPLOY_SSH_HOST"
          if [ -n "$DEPLOY_SSH_USER" ]; then
            ssh_target="${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}"
          fi
          ssh -p "$DEPLOY_SSH_PORT" -o BatchMode=yes "$ssh_target" "$remote_cmd"
