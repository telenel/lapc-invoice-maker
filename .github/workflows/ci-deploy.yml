name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test

  deploy:
    name: Deploy to VPS
    needs: [check, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: montalvo.io
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 8m
          script: |
            cd /opt/lapc-invoice-maker
            git pull origin main || (git init && git remote add origin https://github.com/telenel/lapc-invoice-maker.git && git fetch origin main && git checkout -f origin/main)
            docker compose down --remove-orphans 2>/dev/null || true
            docker compose build app
            docker compose up -d
