name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx prisma generate

      - uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            src/generated/prisma
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json', 'prisma/schema.prisma') }}

  lint:
    name: Lint
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            src/generated/prisma
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json', 'prisma/schema.prisma') }}

      - run: npm run lint

  build:
    name: Build
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            src/generated/prisma
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json', 'prisma/schema.prisma') }}

      - run: npm run build

  test:
    name: Tests
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            src/generated/prisma
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json', 'prisma/schema.prisma') }}

      - run: npx vitest run --dir tests --dir src/__tests__

  deploy:
    name: Deploy to VPS
    needs: [lint, build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          response=$(curl -sS --connect-timeout 10 --max-time 30 -o /dev/null -w "%{http_code}" -X POST \
            https://montalvo.io/hooks/deploy-lapc \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}")
          echo "Webhook response: $response"
          if [ "$response" != "200" ]; then
            echo "Deploy webhook failed with status $response"
            exit 1
          fi
          echo "Deploy triggered successfully"

      - name: Health check
        run: |
          echo "Waiting 90s for deploy to complete..."
          sleep 90
          for i in 1 2 3; do
            status=$(curl -sS --connect-timeout 10 --max-time 20 -o /dev/null -w "%{http_code}" https://invoice.montalvo.io/api/auth/session)
            echo "Attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed after 3 attempts"
          exit 1
