name: CI & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".superpowers/**"
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          predicate-quantifier: every
          filters: |
            code:
              - 'src/**'
              - 'prisma/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'next.config.*'
              - '.github/workflows/**'

      - uses: actions/setup-node@v4
        if: steps.filter.outputs.code == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Restore deps cache
        id: cache
        if: steps.filter.outputs.code == 'true'
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            src/generated/prisma
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json', 'prisma/schema.prisma') }}

      - name: Restore Next.js build cache
        if: steps.filter.outputs.code == 'true'
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**', 'prisma/schema.prisma') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        if: steps.filter.outputs.code == 'true' && steps.cache.outputs.cache-hit != 'true'
        run: npm ci && npx prisma generate

      - name: Lint
        if: steps.filter.outputs.code == 'true'
        run: npm run lint

      - name: Test
        if: steps.filter.outputs.code == 'true'
        run: npx vitest run --dir tests --dir src/__tests__

      - name: Build
        if: steps.filter.outputs.code == 'true'
        run: npm run build

  deploy:
    name: Deploy to VPS
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          response=$(curl -sfS --connect-timeout 10 --max-time 30 -X POST \
            https://montalvo.io/hooks/deploy-laportal \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            -w "\n%{http_code}")
          body=$(printf '%s\n' "$response" | sed '$d')
          code=$(printf '%s\n' "$response" | tail -1)
          echo "Webhook response: HTTP $code — $body"
          if [ "$code" != "200" ] || ! printf '%s' "$body" | grep -Fq "Deploy triggered"; then
            echo "Deploy webhook failed: HTTP $code — $body"
            exit 1
          fi
          echo "Deploy triggered successfully"

      - name: Health check
        run: |
          echo "Waiting 60s for deploy to complete..."
          sleep 60
          for i in 1 2 3 4 5; do
            status=$(curl -sfS --connect-timeout 10 --max-time 20 -o /dev/null -w "%{http_code}" https://laportal.montalvo.io/api/auth/session)
            echo "Attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
