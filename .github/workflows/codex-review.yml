name: Codex Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: codex-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  codex_review:
    name: Codex Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Pre-fetch base and head refs for the PR
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Run Codex PR review
        id: run_codex
        uses: openai/codex-action@v1
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          openai-api-key: ${{ secrets.GHRUNNER }}
          prompt-file: .github/prompts/codex-pr-review.md
          sandbox: read-only
          model: gpt-5.4
          effort: high
          output-file: codex-review.txt

  codex_gate:
    name: Codex Review Gate
    runs-on: ubuntu-latest
    needs: codex_review
    permissions:
      contents: read
    steps:
      - name: Parse Codex result
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex_review.outputs.final_message }}
        run: |
          if [ -z "$CODEX_FINAL_MESSAGE" ]; then
            echo "::error::Codex returned no final message."
            exit 1
          fi

          result=$(printf '%s\n' "$CODEX_FINAL_MESSAGE" | awk -F': ' '/^RESULT:/ {print $2; exit}')

          {
            echo "## Codex Review"
            echo
            printf '%s\n' "$CODEX_FINAL_MESSAGE"
          } >> "$GITHUB_STEP_SUMMARY"

          case "$result" in
            PASS) ;;
            FAIL)
              echo "::error::Codex found blocking review issues."
              exit 1
              ;;
            *)
              echo "::error::Unexpected RESULT value: ${result:-<missing>}"
              exit 1
              ;;
          esac
