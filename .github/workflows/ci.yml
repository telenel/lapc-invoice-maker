name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "**/*.md"
      - "docs/**"
      - ".superpowers/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "**/*.md"
      - "docs/**"
      - ".superpowers/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.{js,jsx,ts,tsx,mdx}', 'public/**/*', 'prisma/**/*', 'next.config.*', 'postcss.config.*', 'tailwind.config.*', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        run: npm ci && npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
        run: npm run build
