name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Safety net: allow manual re-run of CI for a given ref. Needed when a
  # merge push-event workflow didn't fire (e.g., the GITHUB_TOKEN auto-merge
  # attribution bug that skipped PR #175's deploy on 2026-04-18).
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.8

      - name: Run actionlint
        run: '"$(go env GOPATH)/bin/actionlint" -color'

  migration_check:
    name: migration-check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ci
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: "postgresql://ci:ci@127.0.0.1:5432/ci?schema=public"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bootstrap Supabase-like roles for raw SQL migrations
        run: |
          node - <<'NODE'
          const { Client } = require("pg");

          async function main() {
            const client = new Client({ connectionString: process.env.DATABASE_URL });
            await client.connect();
            await client.query(`
              DO $$
              BEGIN
                IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'anon') THEN
                  CREATE ROLE anon NOLOGIN;
                END IF;
                IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'authenticated') THEN
                  CREATE ROLE authenticated NOLOGIN;
                END IF;
                IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'service_role') THEN
                  CREATE ROLE service_role NOLOGIN;
                END IF;
                IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'prisma') THEN
                  CREATE ROLE prisma NOLOGIN;
                END IF;
              END
              $$;
            `);
            await client.end();
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Apply Prisma migrations end to end
        run: npx prisma migrate deploy

  ship_check:
    name: ship-check
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
    steps:
      - uses: actions/checkout@v5

      - name: Detect validation-relevant changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - '.github/workflows/**'
              - 'hooks/**'
              - 'package.json'
              - 'package-lock.json'
              - 'src/**'
              - 'public/**'
              - 'prisma/**'
              - 'scripts/**'
              - 'tests/**'
              - 'next.config.*'
              - 'postcss.config.*'
              - 'tailwind.config.*'
              - 'tsconfig.json'
              - 'vitest.config.*'

      - name: Skip docs-only validation
        if: steps.changes.outputs.relevant != 'true'
        run: echo "Docs-only change detected; skipping ship-check."

      - uses: actions/setup-node@v6
        if: steps.changes.outputs.relevant == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Restore Next.js build cache
        if: steps.changes.outputs.relevant == 'true'
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.{js,jsx,ts,tsx,mdx}', 'public/**/*', 'prisma/**/*', 'next.config.*', 'postcss.config.*', 'tailwind.config.*', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        if: steps.changes.outputs.relevant == 'true'
        run: npm ci && npx prisma generate

      - name: Run ship-check
        if: steps.changes.outputs.relevant == 'true'
        run: npm run ship-check
