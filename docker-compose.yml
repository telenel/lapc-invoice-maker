services:
  app:
    build:
      context: .
      args:
        BUILD_SHA: ${BUILD_SHA:-dev}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    restart: unless-stopped
    expose:
      - "3000"
    env_file: .env
    environment:
      BUILD_SHA: ${BUILD_SHA:-dev}
      BUILD_TIME: ${BUILD_TIME:-unknown}
      TZ: America/Los_Angeles
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.laportal.rule=Host(`laportal.montalvo.io`)"
      - "traefik.http.routers.laportal.entrypoints=websecure"
      - "traefik.http.routers.laportal.tls.certresolver=letsencrypt"
      - "traefik.http.services.laportal.loadbalancer.server.port=3000"
    networks:
      - default
      - traefik-net
    # Route "host.docker.internal" to the VPS host's docker-bridge IP so the
    # app can reach an SSH reverse tunnel bound on that bridge (lets the VPS
    # talk to intranet-only winprism-la via an on-campus relay machine).
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  default:
    enable_ipv6: true
  traefik-net:
    external: true
