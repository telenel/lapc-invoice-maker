services:
  app:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    env_file: .env
    environment:
      # Override DIRECT_URL for Docker (no IPv6) — use pooler like DATABASE_URL
      DIRECT_URL: ${DATABASE_URL}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.laportal.rule=Host(`laportal.montalvo.io`)"
      - "traefik.http.routers.laportal.entrypoints=websecure"
      - "traefik.http.routers.laportal.tls.certresolver=letsencrypt"
      - "traefik.http.services.laportal.loadbalancer.server.port=3000"
    networks:
      - default
      - traefik-net

networks:
  traefik-net:
    external: true
