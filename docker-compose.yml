services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: invoicemaker
      POSTGRES_PASSWORD: ${DB_PASSWORD:-invoicemaker}
      POSTGRES_DB: invoicemaker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoicemaker"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://invoicemaker:${DB_PASSWORD:-invoicemaker}@db:5432/invoicemaker"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      PDF_STORAGE_PATH: ./data/pdfs
      UPLOAD_PATH: ./public/uploads
    volumes:
      - pdf-data:/app/data/pdfs
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  pdf-data:
  uploads:
